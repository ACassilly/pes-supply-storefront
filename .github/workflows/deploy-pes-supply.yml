# ============================================================================
# PES Supply — Deploy
# Azure App Service PRIMARY (PES-Stage) → Vercel (alex-demo-pes-supply-vercel) FALLBACK
# Staging: auto on every push to main
# Production: manual workflow_dispatch only
# ============================================================================
name: Deploy pes.supply

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  TARGET: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment) || 'staging' }}
  VERCEL_ORG_ID: team_XQxmrDxKnJR8qGObDLGjZrY9
  VERCEL_PROJECT_ID: prj_RFHh7bl9ekSNk8LAA96sXPCJ5gjB
  AZURE_STAGING_APP: PES-Stage

jobs:
  # ── BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build (staging)
        if: env.TARGET == 'staging'
        env:
          NEXT_PUBLIC_SITE_URL: https://staging.pes.supply
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api-staging.pes.supply
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.STAGING_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.STAGING_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          COMMERCE_PROVIDER: medusa
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: pnpm build

      - name: Build (production)
        if: env.TARGET == 'production'
        env:
          NEXT_PUBLIC_SITE_URL: https://pes.supply
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.pes.supply
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
          COMMERCE_PROVIDER: medusa
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: pnpm build

      - name: Package
        run: zip -r build.zip .next public package.json pnpm-lock.yaml next.config.mjs --exclude '*.map' --exclude '.next/cache/*'

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.TARGET }}
          path: build.zip
          retention-days: 3

  # ── AZURE PRIMARY ────────────────────────────────────────────────────────
  azure:
    name: → Azure (PES-Stage)
    needs: build
    runs-on: ubuntu-latest
    outputs:
      healthy: ${{ steps.health.outputs.ok }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-${{ env.TARGET }}

      - name: Deploy to Azure (staging)
        if: env.TARGET == 'staging'
        uses: azure/webapps-deploy@v3
        with:
          app-name: PES-Stage
          publish-profile: ${{ secrets.AZURE_STAGING_PUBLISH_PROFILE }}
          package: build.zip

      - name: Deploy to Azure (production)
        if: env.TARGET == 'production'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_PRODUCTION_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PRODUCTION_PUBLISH_PROFILE }}
          package: build.zip

      - name: Health check
        id: health
        run: |
          URL=$([[ "${{ env.TARGET }}" == "production" ]] && echo "https://pes.supply/api/health" || echo "https://pes-stage-eucmbnd7hfdafeat.eastus2-01.azurewebsites.net/api/health")
          sleep 20
          if curl -sf --retry 5 --retry-delay 10 "$URL" > /dev/null; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "✅ Azure healthy: $URL"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "⚠️ Azure unhealthy — activating Vercel fallback"
          fi

  # ── VERCEL FALLBACK ──────────────────────────────────────────────────────
  vercel-fallback:
    name: ↪ Vercel Fallback
    needs: azure
    if: needs.azure.outputs.healthy == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile

      - name: Vercel fallback (staging)
        if: env.TARGET == 'staging'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SITE_URL: https://staging.pes.supply
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api-staging.pes.supply
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.STAGING_MEDUSA_PUBLISHABLE_KEY }}
          COMMERCE_PROVIDER: medusa
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: |
          pnpm dlx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN
          pnpm dlx vercel build --token=$VERCEL_TOKEN
          pnpm dlx vercel deploy --prebuilt --token=$VERCEL_TOKEN
          echo "🟡 Vercel staging fallback live (alex-demo-pes-supply-vercel)"

      - name: Vercel fallback (production)
        if: env.TARGET == 'production'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_SITE_URL: https://pes.supply
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.pes.supply
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          COMMERCE_PROVIDER: medusa
          NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}
        run: |
          pnpm dlx vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          pnpm dlx vercel build --prod --token=$VERCEL_TOKEN
          pnpm dlx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
          echo "🟡 Vercel production fallback live"

  # ── SMOKE TESTS ───────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    needs: [azure, vercel-fallback]
    if: always() && (needs.azure.result == 'success' || needs.vercel-fallback.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        env:
          STAGING_URL: https://pes-stage-eucmbnd7hfdafeat.eastus2-01.azurewebsites.net
        run: bash scripts/staging-smoke-test.sh
