# ============================================================================
# PES Supply – Azure VM Deployment Workflow
# Mirrors the canonical portlandialogistics.com infra pattern:
#   Node 22 → pnpm build → SSH into Azure VM → pm2 reload
# Triggers: push to main, or manual dispatch
# ============================================================================
name: Deploy pes.supply to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-pes-supply-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  APP_DIR: '/var/www/pes-supply'
  PM2_APP_NAME: 'pes-supply'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build Next.js Storefront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MEDUSA_REGION: ${{ secrets.NEXT_PUBLIC_MEDUSA_REGION || 'us' }}
          NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.NEXT_PUBLIC_SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_STOREFRONT_ACCESS_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_ACCESS_TOKEN }}
          COMMERCE_PROVIDER: ${{ secrets.COMMERCE_PROVIDER || 'medusa' }}
          NEXT_PUBLIC_SITE_URL: https://pes.supply
        run: pnpm build

      - name: Package build artifact
        run: |
          tar -czf pes-supply-build.tar.gz \
            .next \
            public \
            package.json \
            pnpm-lock.yaml \
            next.config.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pes-supply-build
          path: pes-supply-build.tar.gz
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure VM
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: pes-supply-build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}" > ~/.ssh/pes_supply_deploy
          chmod 600 ~/.ssh/pes_supply_deploy
          cat >> ~/.ssh/config <<EOF
          Host pes-supply-vm
            HostName ${{ secrets.AZURE_VM_HOST }}
            User ${{ secrets.AZURE_VM_USER || 'pesadmin' }}
            IdentityFile ~/.ssh/pes_supply_deploy
            StrictHostKeyChecking no
            ServerAliveInterval 30
          EOF

      - name: Upload build to VM
        run: |
          scp -i ~/.ssh/pes_supply_deploy \
            -o StrictHostKeyChecking=no \
            pes-supply-build.tar.gz \
            ${{ secrets.AZURE_VM_USER || 'pesadmin' }}@${{ secrets.AZURE_VM_HOST }}:/tmp/pes-supply-build.tar.gz

      - name: Deploy on VM
        run: |
          ssh pes-supply-vm bash -s << 'ENDSSH'
          set -e

          APP_DIR="/var/www/pes-supply"
          PM2_APP="pes-supply"

          echo "[1/5] Preparing app directory..."
          sudo mkdir -p $APP_DIR
          sudo chown pesadmin:pesadmin $APP_DIR

          echo "[2/5] Extracting build..."
          tar -xzf /tmp/pes-supply-build.tar.gz -C $APP_DIR --strip-components=0
          rm /tmp/pes-supply-build.tar.gz

          echo "[3/5] Installing production deps..."
          cd $APP_DIR
          pnpm install --frozen-lockfile --prod

          echo "[4/5] Reloading pm2..."
          if pm2 describe $PM2_APP > /dev/null 2>&1; then
            pm2 reload $PM2_APP --update-env
          else
            pm2 start npm --name $PM2_APP -- start
            pm2 save
          fi

          echo "[5/5] Deploy complete ✅"
          pm2 status
          ENDSSH

      - name: Health check
        run: |
          sleep 10
          curl -f --retry 3 --retry-delay 5 https://pes.supply || \
          curl -f --retry 3 --retry-delay 5 http://${{ secrets.AZURE_VM_HOST }}:3000 || \
          echo "⚠️  Health check could not reach pes.supply – verify DNS + nginx"

  # ──────────────────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Status
        run: |
          echo "Build: ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ pes.supply deployed successfully from ${{ github.sha }}"
          else
            echo "❌ Deployment failed – check logs above"
            exit 1
          fi
