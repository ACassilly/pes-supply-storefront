# ============================================================================
# PES Supply – Multi-Environment Azure Deploy
# RULE: Every push to main deploys to STAGING only.
#       Production requires manual workflow_dispatch with environment=production.
#       pes.supply stays live and untouched until staging is fully validated.
# ============================================================================
name: Deploy pes.supply to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging deploys automatically; production is manual-only)'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-pes-supply-${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  # ── 1. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build Next.js Storefront
    runs-on: ubuntu-latest
    env:
      TARGET_ENV: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment) || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build (staging)
        if: env.TARGET_ENV == 'staging'
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.STAGING_NEXT_PUBLIC_MEDUSA_BACKEND_URL || 'https://api-staging.pes.supply' }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY || '' }}
          NEXT_PUBLIC_MEDUSA_REGION: ${{ secrets.STAGING_NEXT_PUBLIC_MEDUSA_REGION || 'us' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || '' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.STAGING_NEXT_PUBLIC_GA_MEASUREMENT_ID || '' }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.STAGING_GOOGLE_SITE_VERIFICATION || '' }}
          NEXT_PUBLIC_SITE_URL: 'https://staging.pes.supply'
          COMMERCE_PROVIDER: medusa
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET || '' }}
        run: pnpm build

      - name: Build (production)
        if: env.TARGET_ENV == 'production'
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MEDUSA_REGION: ${{ secrets.NEXT_PUBLIC_MEDUSA_REGION || 'us' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NEXT_PUBLIC_SITE_URL: 'https://pes.supply'
          COMMERCE_PROVIDER: medusa
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: pnpm build

      - name: Package build artifact
        run: |
          tar -czf pes-supply-build.tar.gz \
            .next public package.json pnpm-lock.yaml next.config.mjs

      - uses: actions/upload-artifact@v4
        with:
          name: pes-supply-build-${{ env.TARGET_ENV }}
          path: pes-supply-build.tar.gz
          retention-days: 3

  # ── 2a. Deploy staging (auto on push) ───────────────────────────────────────
  deploy-staging:
    name: Deploy to staging.pes.supply
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pes-supply-build-staging

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_AZURE_VM_SSH_PRIVATE_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          cat >> ~/.ssh/config <<EOF
          Host staging-vm
            HostName ${{ secrets.STAGING_AZURE_VM_HOST }}
            User ${{ secrets.STAGING_AZURE_VM_USER || 'pesadmin' }}
            IdentityFile ~/.ssh/staging_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
          EOF

      - name: Upload + deploy
        run: |
          scp -i ~/.ssh/staging_key -o StrictHostKeyChecking=no \
            pes-supply-build.tar.gz \
            ${{ secrets.STAGING_AZURE_VM_USER || 'pesadmin' }}@${{ secrets.STAGING_AZURE_VM_HOST }}:/tmp/pes-supply-build.tar.gz
          ssh staging-vm bash -s << 'ENDSSH'
          set -e
          APP_DIR="/var/www/pes-supply-staging"
          PM2_APP="pes-supply-staging"
          sudo mkdir -p "$APP_DIR"
          sudo chown ${USER}:${USER} "$APP_DIR"
          tar -xzf /tmp/pes-supply-build.tar.gz -C "$APP_DIR" --strip-components=0
          rm /tmp/pes-supply-build.tar.gz
          cd "$APP_DIR"
          pnpm install --no-frozen-lockfile --prod
          if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
            pm2 reload "$PM2_APP" --update-env
          else
            pm2 start npm --name "$PM2_APP" -- start
            pm2 save
          fi
          pm2 status
          ENDSSH

  # ── 2b. Smoke tests on staging ──────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke Test staging.pes.supply
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Run smoke tests
        run: |
          BASE="https://staging.pes.supply"
          echo "Testing $BASE ..."
          curl -sf "$BASE" > /dev/null && echo "  ✅ homepage"
          curl -sf "$BASE/sitemap.xml" > /dev/null && echo "  ✅ sitemap"
          curl -sf "$BASE/api/health" > /dev/null && echo "  ✅ health" || echo "  ⏳ health (Medusa not yet up)"
          curl -sf "$BASE/api/google-merchant-feed" > /dev/null && echo "  ✅ merchant feed" || echo "  ⏳ merchant feed"
          echo "Smoke tests complete."

  # ── 3. Deploy PRODUCTION — manual dispatch only ──────────────────────────────
  deploy-production:
    name: "🚀 Deploy to pes.supply (PRODUCTION — manual only)"
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pes-supply-build-production

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}" > ~/.ssh/prod_key
          chmod 600 ~/.ssh/prod_key
          cat >> ~/.ssh/config <<EOF
          Host prod-vm
            HostName ${{ secrets.AZURE_VM_HOST }}
            User ${{ secrets.AZURE_VM_USER || 'pesadmin' }}
            IdentityFile ~/.ssh/prod_key
            StrictHostKeyChecking no
            ServerAliveInterval 30
          EOF

      - name: Upload + deploy
        run: |
          scp -i ~/.ssh/prod_key -o StrictHostKeyChecking=no \
            pes-supply-build.tar.gz \
            ${{ secrets.AZURE_VM_USER || 'pesadmin' }}@${{ secrets.AZURE_VM_HOST }}:/tmp/pes-supply-build.tar.gz
          ssh prod-vm bash -s << 'ENDSSH'
          set -e
          APP_DIR="/var/www/pes-supply"
          PM2_APP="pes-supply"
          sudo mkdir -p "$APP_DIR"
          sudo chown ${USER}:${USER} "$APP_DIR"
          tar -xzf /tmp/pes-supply-build.tar.gz -C "$APP_DIR" --strip-components=0
          rm /tmp/pes-supply-build.tar.gz
          cd "$APP_DIR"
          pnpm install --no-frozen-lockfile --prod
          if pm2 describe "$PM2_APP" > /dev/null 2>&1; then
            pm2 reload "$PM2_APP" --update-env
          else
            pm2 start npm --name "$PM2_APP" -- start
            pm2 save
          fi
          pm2 status
          ENDSSH

      - name: Health check production
        run: |
          sleep 10
          curl -f --retry 3 --retry-delay 5 https://pes.supply

  # ── 4. Summary ───────────────────────────────────────────────────────────────
  notify:
    name: Deployment Summary
    needs: [build, deploy-staging, smoke-test-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Status
        run: |
          echo "Build:              ${{ needs.build.result }}"
          echo "Deploy staging:     ${{ needs.deploy-staging.result }}"
          echo "Smoke test staging: ${{ needs.smoke-test-staging.result }}"
          echo "Deploy production:  ${{ needs.deploy-production.result }}"
          if [ "${{ needs.build.result }}" != 'success' ]; then
            echo "❌ Build failed"; exit 1
          fi
          echo "✅ Pipeline complete for ${{ github.sha }}"
