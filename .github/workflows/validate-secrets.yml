name: Validate Required Secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate-secrets:
    name: Check all required secrets are set
    runs-on: ubuntu-latest
    steps:
      - name: Check storefront secrets
        run: |
          missing=""
          check() {
            if [ -z "$1" ]; then
              echo "MISSING: $2"
              missing="$missing $2"
            else
              echo "OK: $2"
            fi
          }
          check "${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}" "NEXT_PUBLIC_MEDUSA_BACKEND_URL"
          check "${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}" "NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY"
          check "${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"
          check "${{ secrets.STRIPE_SECRET_KEY }}" "STRIPE_SECRET_KEY"
          check "${{ secrets.STRIPE_WEBHOOK_SECRET }}" "STRIPE_WEBHOOK_SECRET"
          check "${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}" "NEXT_PUBLIC_GA_MEASUREMENT_ID"
          check "${{ secrets.RESEND_API_KEY }}" "RESEND_API_KEY"
          check "${{ secrets.ODOO_URL }}" "ODOO_URL"
          check "${{ secrets.ODOO_API_KEY }}" "ODOO_API_KEY"
          check "${{ secrets.RIVEN_GPU_COST_PER_HOUR }}" "RIVEN_GPU_COST_PER_HOUR"

          if [ -n "$missing" ]; then
            echo ""
            echo "⚠️  Missing secrets:$missing"
            echo "Add these in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          else
            echo "✅ All required secrets are set."
          fi

  build-check:
    name: TypeScript + Next.js build check
    runs-on: ubuntu-latest
    needs: validate-secrets
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm tsc --noEmit
      - run: pnpm build
        env:
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://api.pes.supply
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-PLACEHOLDER
          NEXT_PUBLIC_SITE_URL: https://pes.supply
