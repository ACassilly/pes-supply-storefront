# Nginx config for pes.supply — Azure VM
# Place:  /etc/nginx/sites-available/pes-supply
# Enable: sudo ln -s /etc/nginx/sites-available/pes-supply /etc/nginx/sites-enabled/
# Test:   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name www.pes.supply;
    return 301 https://pes.supply$request_uri;
}

server {
    listen 80;
    server_name pes.supply;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name api.pes.supply;

    location /app {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass         http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        add_header 'Access-Control-Allow-Origin' 'https://pes.supply' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'x-publishable-api-key, Content-Type, Authorization' always;
        if ($request_method = 'OPTIONS') { return 204; }
    }
}
