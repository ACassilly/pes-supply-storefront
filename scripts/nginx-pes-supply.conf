# ============================================================
# Nginx vhosts for pes.supply
# Install: sudo cp nginx-pes-supply.conf /etc/nginx/sites-available/pes-supply
#          sudo ln -sf /etc/nginx/sites-available/pes-supply /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── staging.pes.supply ─────────────────────────────────────────────────
server {
    listen 80;
    server_name staging.pes.supply;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.pes.supply;

    ssl_certificate     /etc/letsencrypt/live/staging.pes.supply/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.pes.supply/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;  # block staging from Google

    # Proxy to Next.js on port 3001 (staging)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Static assets — long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Health check bypass
    location /api/health {
        proxy_pass http://127.0.0.1:3001/api/health;
        access_log off;
    }
}

# ── api-staging.pes.supply (Medusa) ──────────────────────────────
server {
    listen 80;
    server_name api-staging.pes.supply;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api-staging.pes.supply;

    ssl_certificate     /etc/letsencrypt/live/api-staging.pes.supply/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-staging.pes.supply/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Medusa store API
    location /store/ {
        proxy_pass         http://127.0.0.1:9000/store/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # CORS for staging storefront
        add_header Access-Control-Allow-Origin "https://staging.pes.supply" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,x-publishable-api-key" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Medusa webhooks
    location /webhooks/ {
        proxy_pass http://127.0.0.1:9000/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Medusa admin (restrict to IP if possible)
    location /app {
        proxy_pass http://127.0.0.1:9000/app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Health
    location /health {
        proxy_pass http://127.0.0.1:9000/health;
        access_log off;
    }
}

# ── pes.supply (production) ───────────────────────────────────────────
server {
    listen 80;
    server_name pes.supply www.pes.supply;
    return 301 https://pes.supply$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pes.supply www.pes.supply;

    ssl_certificate     /etc/letsencrypt/live/pes.supply/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pes.supply/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }
}

